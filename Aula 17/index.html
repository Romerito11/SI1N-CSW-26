<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 17</title>
</head>

<body>
    <div class="banner-bebe">
        <h1 style="text-align: center; color: rgb(36, 36, 88);">Calculadora de idade</h1>
    </div>
    <div class="calcula-Ano">
        <form action="">
            <label for="">Dia do Nascimento:</label>
            <input type="number" id="dia" placeholder="Dia" min="1" max="31">
        </form>
        <label for="">
            <select name="mes" id="mes">
                <option value="1">Janeiro</option>
                <option value="2">Fevereiro</option>
                <option value="3">Março</option>
                <option value="4">Abril</option>
                <option value="5">Maio</option>
                <option value="6">Junho</option>
                <option value="7">Julho</option>
                <option value="8">Agosto</option>
                <option value="9">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
        </label>
        <input type="number" id="ano" placeholder="Ano" min="1900" max="2030">
        <button onclick='calcula_idade()'>Calcular idade</button>
    </div>



    <div class="banner-mat">
        <h1 style="text-align: center; color: rgb(36, 36, 88);">Calculadora</h1>
    </div>

    <div class="calcula">
        <form action="">
            <label for="">Número1:</label>
            <input type="number" id="n1" placeholder="Número 1">
        </form>
        <label for="">
            <select type="text" name="opera" id="opera">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
        </label>
        <form action="">
            <label for="">Número1:</label>
            <input type="number" id="n2" placeholder="Número 2">
        </form>
        <button onclick='calcula()'>Calcular</button>
        <h2 onmouseover='calcula()' id="resultado">Resultado</h2>
    </div>



</body>

</html>
<style>
    .banner-bebe {
        width: 500px;
        background-image: url(./Imagen/bebe.jpg);
        padding: 20PX;
        border: 20px solid rgb(36, 36, 88);
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
    }

    .banner-mat {
        width: 500px;
        background-image: url(./Imagen/simbulos.jpg);
        padding: 20PX;
        border: 20px solid rgb(36, 36, 88);
        background-size: 23%;
    }

    .calcula-Ano {
        display: flex;
        padding: 20px;
        align-items: center;
        gap: 20px;
    }

    .calcula {
        display: flex;
        padding: 20px;
        align-items: center;
        gap: 20px;
    }
</style>
<script>

    function calcula_idade() {
        
        let dia = parseInt(document.getElementById('dia').value);
        let mes = parseInt(document.getElementById('mes').value);
        let ano = parseInt(document.getElementById('ano').value);

        let hoje = new Date();

        let anohoje = new Date().getFullYear();

        let idade = anohoje - ano;

        let aniver = new Date(anohoje + "/" + mes + "/" + dia);

        if (hoje < aniver) {
            idade--;
        }

        window.alert('Sua Idade é: ' + idade);
        
    }


    function calcula(){
        
        let n1 = parseFloat(document.getElementById('n1').value);
        let n2 = parseFloat(document.getElementById('n2').value);
        let opera = document.getElementById('opera').value;
        let cal;

        if(opera == '+'){ 
            cal = n1 + n2;
        }

        if(opera == '-'){
            cal = n1 - n2;
        }

        if(opera == '/'){
            cal = n1 / n2;
        }

        if(opera == '*'){
            cal = n1 * n2;
        }

        document.getElementById('resultado').innerText = cal;

    }
</script>
